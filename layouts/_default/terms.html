{{ define "main" }}
  <section class="list-hero">
    <p class="eyebrow">Index</p>
    <h1>{{ .Title }}</h1>
  </section>
  <div class="term-cloud">
    {{ range .Data.Terms.Alphabetical }}
      <a href="{{ .Page.RelPermalink }}">
        <span>{{ .Page.LinkTitle }}</span>
        <small>{{ .Count }}</small>
      </a>
    {{ end }}
  </div>
{{ end }}
