baseURL: "https://notes.leftjun.example/"
languageCode: "zh-cn"
title: "阈限手记 | Limenaut Notes"
defaultContentLanguage: "zh-cn"
hasCJKLanguage: true
relativeURLs: true
enableRobotsTXT: true

pagination:
  pagerSize: 8
  path: "page"

permalinks:
  posts: "/posts/:slug/"
  diary: "/diary/:year/:month/:slug/"
  travel: "/travel/:slug/"
  ideas: "/ideas/:slug/"
  events: "/events/:slug/"

taxonomies:
  category: "categories"
  tag: "tags"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    lineNos: true
    style: "monokai"

menus:
  main:
    - identifier: "home"
      name: "首页"
      url: "/"
      weight: 10
      params:
        icon: "⌂"
    - identifier: "posts"
      name: "随笔"
      url: "/posts/"
      weight: 20
      params:
        icon: "✦"
    - identifier: "diary"
      name: "日记"
      url: "/diary/"
      weight: 30
      params:
        icon: "◷"
    - identifier: "travel"
      name: "旅行"
      url: "/travel/"
      weight: 40
      params:
        icon: "⌁"
    - identifier: "ideas"
      name: "小巧思"
      url: "/ideas/"
      weight: 50
      params:
        icon: "※"
    - identifier: "events"
      name: "活动"
      url: "/events/"
      weight: 60
      params:
        icon: "◇"
    - identifier: "about"
      name: "关于"
      url: "/about/"
      weight: 70
      params:
        icon: "?"

params:
  author: "Left Jun"
  avatar: "img/avatar.jpg"
  subtitle: "随笔、日记、旅行与一些突然冒出来的小想法。"
  description: "Left Jun 的生活记录小站。"
  mainSections:
    - "posts"
    - "diary"
    - "travel"
    - "ideas"
    - "events"
  status:
    emoji: "💻"
    title: "专注中"
    description: "正在给生活也搭一个小站。"
  home:
    kicker: "Limenaut Notes"
    title: "把项目之外的日子，也认真收起来。"
    intro: "这里会放随笔、日记、旅行记录、小巧思和活动经历。作品集站负责证明我做过什么，这里负责留下我怎么想、怎么走、怎么被某个瞬间击中。"
  social:
    - identifier: "github"
      name: "GitHub"
      url: "https://github.com/Left-Jun"
    - identifier: "youtube"
      name: "YouTube"
      url: "https://www.youtube.com/@Limenaut"
    - identifier: "bilibili"
      name: "Bilibili"
      url: "https://space.bilibili.com/498452594?spm_id_from=333.1007.0.0"
    - identifier: "xiaohongshu"
      name: "小红书"
      url: "https://www.xiaohongshu.com/user/profile/608d850d000000000100987d"
  footer:
    since: 2026
    text: "Built with Hugo"
